<!DOCTYPE html>
<html>
<head>
    <title>Pest & Timber Inspection Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Pest & Timber Inspection Form</h1>

<form>

<h2>Client Details</h2>

<p>
<label>Client Name</label><br>
<input type="text" style="width:400px;">
</p>

<p>
<label>Email</label><br>
<input type="email" style="width:400px;">
</p>

<p>
<label>Phone</label><br>
<input type="text" style="width:400px;">
</p>

<p>
<label>Property Address</label><br>
<input type="text" style="width:600px;">
</p>

<h2>Inspection Details</h2>

<p>
<label>Inspection Date</label><br>
<input type="date">
</p>

<p>
<label>Inspector Name</label><br>
<input type="text" style="width:400px;">
</p>

<h2>Termite Activity</h2>

<p>
<select>
<option>No Activity Found</option>
<option>Minor Activity Found</option>
<option>Moderate Activity Found</option>
<option>Major Activity Found</option>
</select>
</p>

<h2>Timber Damage</h2>

<p>
<select>
<option>No Damage</option>
<option>Minor Damage</option>
<option>Moderate Damage</option>
<option>Severe Damage</option>
</select>
</p>

<h2>Conducive Conditions</h2>

<p>
<textarea rows="5" cols="80"></textarea>
</p>

<h2>Moisture Issues</h2>

<p>
<textarea rows="5" cols="80"></textarea>
</p>

<h2>Recommendations</h2>

<p>
<textarea rows="6" cols="80"></textarea>
</p>

<h2>Inspector Comments</h2>

<p>
<textarea rows="8" cols="80"></textarea>
</p>

<button type="submit">Save Inspection</button>

</form>

<br><br>

<a href="forms.html">← Back to Forms</a>

</body>
</html>
