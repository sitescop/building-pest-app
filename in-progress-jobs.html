<!DOCTYPE html>
<html>
<head>
    <title>In Progress Jobs</title>
</head>
<body>

<h1>In Progress Jobs</h1>

<table border="1" cellpadding="10" id="jobsTable">
    <tr>
        <th>Job No</th>
        <th>Client</th>
        <th>Date</th>
        <th>Inspection Type</th>
        <th>Status</th>
        <th>Open</th>
        <th>Delete</th>
    </tr>

    

</table>

<br><br>

<a href="jobs.html">← Back to Jobs</a>
<script>

let jobs = JSON.parse(localStorage.getItem("sitescopJobs")) || [];

let table = document.getElementById("jobsTable");

jobs.forEach(job => {

    let row = table.insertRow(-1);

    row.insertCell(0).innerHTML = job.jobNumber;
    row.insertCell(1).innerHTML = job.client;
    row.insertCell(2).innerHTML = job.date;
    row.insertCell(3).innerHTML = job.inspectionType;
    row.insertCell(4).innerHTML = job.status;

 row.insertCell(5).innerHTML =
    '<button onclick="openJob(' + (jobs.indexOf(job)) + ')">Open</button>';

row.insertCell(6).innerHTML =
    '<button onclick="deleteJob(' + (jobs.indexOf(job)) + ')">Delete</button>';

});
    function openJob(index) {

    let jobs = JSON.parse(localStorage.getItem("sitescopJobs")) || [];

    localStorage.setItem(
        "currentInspection",
        JSON.stringify(jobs[index])
    );

    window.location.href = "pest-timber-v2.html";
}

function deleteJob(index) {

    if (!confirm("Are you sure you want to delete this job?")) {
        return;
    }

    let jobs = JSON.parse(localStorage.getItem("sitescopJobs")) || [];

    jobs.splice(index, 1);

    localStorage.setItem("sitescopJobs", JSON.stringify(jobs));

    location.reload();

}
</script>
</body>
</html>
