<!DOCTYPE html>
<html>
<head>
    <title>Inspection Booking Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Building & Pest Inspection Booking</h1>

<form>

<p>
<label>Client Name</label><br>
<input type="text" style="width:300px;">
</p>

<p>
<label>Email</label><br>
<input type="email" style="width:300px;">
</p>

<p>
<label>Phone</label><br>
<input type="text" style="width:300px;">
</p>

<p>
<label>Property Address</label><br>
<input type="text" style="width:500px;">
</p>

<p>
<label>Inspection Type</label><br>
<select>
<option>Building Inspection</option>
<option>Pest Inspection</option>
<option>Combined Building & Pest</option>
</select>
</p>

<p>
<label>Preferred Inspection Date</label><br>
<input type="date">
</p>

<p>
<label>Agent Name</label><br>
<input type="text" style="width:300px;">
</p>

<p>
<label>Agent Phone</label><br>
<input type="text" style="width:300px;">
</p>

<p>
<label>Notes</label><br>
<textarea rows="5" cols="60"></textarea>
</p>

<button type="submit">Save Booking</button>

</form>

<br><br>

<a href="index.html">← Back to Dashboard</a>

</body>
</html>
