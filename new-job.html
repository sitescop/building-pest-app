<!DOCTYPE html>
<html>
<head>
<title>New Job</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Create New Job</h1>

<form>

<p>
Client Name<br>
<input type="text" style="width:400px;">
</p>

<p>
Client Email<br>
<input type="email" style="width:400px;">
</p>

<p>
Client Phone<br>
<input type="text" style="width:400px;">
</p>

<p>
Property Address<br>
<input type="text" style="width:600px;">
</p>

<p>
Agent Name<br>
<input type="text" style="width:400px;">
</p>

<p>
Agent Phone<br>
<input type="text" style="width:400px;">
</p>

<p>
Inspection Date<br>
<input type="date">
</p>

<p>
Inspection Type<br>
<select>
<option>Pest & Timber Inspection</option>
<option>Building Inspection</option>
<option>Combined Inspection</option>
</select>
</p>

<button type="submit">Create Job</button>

</form>

<br><br>

<a href="jobs.html">← Back to Jobs</a>

</body>
</html>
